services:
  virbooks-app:
    build:
      context: ./virbooks-app
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./virbooks-app/.env
    depends_on:
      - virbooks-api
    ports:
      - "80:80"
    networks:
      - virbooks-net

  virbooks-api:
    build:
      context: ./virbooks-api
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./virbooks-api/.env
    depends_on:
      - virbooks-db
    ports:
      - "5050"
    networks:
      - virbooks-net

  virbooks-db:
    image: mongo:6
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret123
      MONGO_INITDB_DATABASE: books
    volumes:
      - db-data:/data/db
    networks:
      - virbooks-net

volumes:
  db-data:
    driver: local

networks:
  virbooks-net:
    driver: bridge
