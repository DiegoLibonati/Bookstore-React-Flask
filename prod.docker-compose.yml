services:
  virbooks-app:
    build:
      context: ./virbooks-app
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./virbooks-app/.env
    depends_on:
      - virbooks-api
    ports:
      - 3000:8080
    networks:
      - virbooks-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  virbooks-api:
    build:
      context: ./virbooks-api
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./virbooks-api/.env
    depends_on:
      virbooks-db:
        condition: service_healthy
    ports:
      - 5050:5050
    networks:
      - virbooks-net

  virbooks-db:
    image: mongo:7.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - db-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - virbooks-net

volumes:
  db-data:
    driver: local

networks:
  virbooks-net:
    driver: bridge
